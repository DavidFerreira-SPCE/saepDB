<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel - Restaurante</title>
    <link rel="stylesheet" href="painel.css">
</head>
<body>

    <div class="sidebar">
        <h2>Estoque Forra-Bucho</h2>
        <a href="#"> Inventário</a>
        <a href="#"> Fornecedores</a>
        <a href="#"> Movimentações</a>
        
        <a href="index.html" class="btn-sair"> Sair</a>
    </div>

    <div class="content">
        <h1>Gestão de Estoque</h1>
        <p>Visão geral dos produtos cadastrados no sistema.</p>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome do Produto</th>
                    <th>Categoria</th>
                    <th>Marca</th>
                </tr>
            </thead>
            <tbody id="tabelaProdutos">
                <tr><td colspan="5" style="text-align: center;">Carregando produtos...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        async function carregarProdutos() {
            try {

                const response = await fetch('http://localhost:3000/inventory');
                const produtos = await response.json();
                const tbody = document.getElementById('tabelaProdutos');
                tbody.innerHTML = '';

                if (produtos.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align: center;">Nenhum produto cadastrado no estoque.</td></tr>';
                    return;
                }
                produtos.forEach(produto => {
                    const linha = `
                        <tr>
                            <td>${produto.id}</td>
                            <td><strong>${produto.productname}</strong></td>
                            <td>${produto.category}</td>
                            <td>${produto.brand}</td>
                        </tr>
                    `;
                    tbody.innerHTML += linha;
                });

            } catch (error) {
                console.error("Erro ao buscar dados:", error);
                document.getElementById('tabelaProdutos').innerHTML = '<tr><td colspan="5" style="text-align: center; color: red;">Erro ao conectar com o banco de dados.</td></tr>';
            }
        }
        window.onload = carregarProdutos;
    </script>
</body>
</html>
