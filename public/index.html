<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Login - Controle de Estoque</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-box">
        <h2 style="text-align: center;">SAEP Restaurante</h2>
        <form id="formLogin">
            <label for="mail">E-mail:</label>
            <input type="email" id="mail" required placeholder="exemplo@restaurante.com">

            <label for="password">Senha:</label>
            <input type="password" id="password" required placeholder="******">

            <button type="submit">Entrar</button>
        </form>
        <p id="mensagemErro" class="erro">E-mail ou senha inválidos.</p>
    </div>

    <script>
        document.getElementById('formLogin').addEventListener('submit', async function(event) {
            event.preventDefault();  
            const mailDigitado = document.getElementById('mail').value;
            const senhaDigitada = document.getElementById('password').value;
            try {
                const response = await fetch('http://localhost:3000/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        mail: mailDigitado, 
                        password: senhaDigitada 
                    }) 
                });

               if (response.ok) {
                    const data = await response.json();
                    alert('Logado com sucesso! Bem-vindo, ' + data.user.username);
                    window.location.href = 'painel.html';
                } else {
                    document.getElementById('mensagemErro').style.display = 'block';
                }
            } catch (error) {
                alert('Erro de conexão! O servidor está rodando no terminal?');
            }
        });
    </script>
</body>
</html>
