<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Forra Bucho | Novo Item</title>
    <link rel="stylesheet" href="../CSS/create.css">
</head>
<body>
    <div class="container">
        <header>
            <button onclick="voltar()" class="btn-voltar">⬅ Voltar</button>
            <h1>Cadastrar Novo Produto</h1>
        </header>

        <form id="formCreate">
            <div class="field">
                <label>Nome do Produto</label>
                <input type="text" id="nome" placeholder="Ex: Macaxeira" required>
            </div>
            <div class="field">
                <label>Categoria</label>
                <input type="text" id="categoria" placeholder="Ex: Acompanhamentos" required>
            </div>
            <div class="field">
                <label>Quantidade</label>
                <input type="number" id="quantidade" placeholder="0" required>
            </div>
            <button type="submit" class="btn-enviar">Salvar no Estoque</button>
        </form>
    </div>

    <script src="../JS/create.js"></script>
</body>
</html>
